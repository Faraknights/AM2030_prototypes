services:
  react-ui:
    build:
      context: .
      dockerfile: ./react-ui/Dockerfile
    container_name: react-ui
    ports:
      - "3000:3000"
    volumes:
      - ./react-ui:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
    stdin_open: true
    tty: true
    depends_on:
      - app

  app:
    build:
      context: ./server
      dockerfile: Dockerfile 
      args:
        USE_CUDA: "false"
    container_name: app
    ports:
      - "5000:5000"
    env_file:
      - ./.env
    volumes:
      - ./models:/models
      - ./llamipa_adapter:/outputs/llamipa_adapter
    deploy:
      resources:
        limits:
          memory: 40g